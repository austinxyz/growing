schema: spec-driven

# Project context — injected into every artifact's instruction prompt.
context: |
  Tech stack: Java 17 + Spring Boot 3.2 backend, Vue 3 + Tailwind frontend,
  MySQL 8 (no Flyway, plain SQL migrations under database/migrations/),
  JWT auth with bcrypt passwords.

  Backend tests: JUnit 5 + Mockito (unit), Spring Boot Test (IT). Source
  layout mirrors src/main → src/test. No JaCoCo plugin yet — coverage
  is by inspection.

  Frontend tests: vitest + @vue/test-utils + happy-dom. Specs live under
  frontend/tests/ mirroring src/views|components|api.

  Conventions:
    - Conventional Commits (feat:/fix:/chore:/docs:/refactor:/test:)
    - No console.log in production code (console.error in catch is OK
      for parity with existing project pattern)
    - Axios baseURL is '/api' — API calls must NOT add the prefix again
    - Axios response interceptor unwraps response.data — use
      `const data = await api.x()` (not `response.data`)
    - Component path uses hyphen (job-search/), not camelCase
    - DB migrations are plain SQL files named V{N}_<topic>.sql

  Superpowers integration:
    - This project pairs OpenSpec with Anthropic superpowers skills.
    - /opsx:propose triggers superpowers:brainstorming BEFORE artifact
      generation (see .claude/commands/opsx/propose.md).
    - /opsx:apply runs superpowers:test-driven-development at session
      start and superpowers:requesting-code-review at task-group
      checkpoints (see .claude/commands/opsx/apply.md).
    - tasks.md MUST scaffold TDD discipline + review checkpoints so the
      apply phase has the hooks it needs.

# Per-artifact rules — appended to artifact-specific instructions.
# Each rule must be a quoted scalar to avoid YAML multi-line ambiguity.
rules:
  proposal:
    - "Always include a Non-Goals (or Out-of-Scope) section."
    - "Capabilities section MUST list which existing capability is modified. Look in openspec/specs/ first; do not invent capability names."
    - "If the change has visual/UX surface, mention that brainstorming has already produced a design spec under docs/superpowers/specs/."

  design:
    - "Reference the brainstorming spec doc under docs/superpowers/specs/ as a primary input when one exists for this change."
    - "Decisions section MUST cover alternatives considered, not just the choice made."

  tasks:
    - "Each implementation task that introduces NEW behavior MUST be preceded by a RED-failing-test task. Pattern: '- [ ] N.X RED — write failing test for <behavior>' followed by '- [ ] N.X+1 GREEN — minimal impl to pass the test'. Use vitest for frontend, JUnit5+Mockito for backend."
    - "Bug fixes MUST be preceded by a regression test that reproduces the bug (RED), then the fix (GREEN)."
    - "Each '## N' task group MUST end with a checkpoint task: '- [ ] N.Z Run superpowers:requesting-code-review on the diff for group N; address CRITICAL/HIGH findings before moving on'."
    - "The final task group MUST include a verification task: '- [ ] M.K Run superpowers:verification-before-completion (mvn test + npm test + grep for console.log + diff review)'."
    - "Tasks SHOULD explicitly name the superpowers skill to invoke when relevant (e.g., 'Invoke superpowers:test-driven-development to scaffold tests for the new service method')."
