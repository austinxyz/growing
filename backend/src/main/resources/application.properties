# Default Configuration
# By default, use development profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Application Name
spring.application.name=growing-app

# Server Port
server.port=8082

# Database Configuration
# These values are loaded from environment variables or backend/.env
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:growing}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
