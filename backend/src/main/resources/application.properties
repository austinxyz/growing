# Default Configuration
# By default, use development profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Application Name
spring.application.name=growing-app

# Server Port
server.port=8082

# Database Configuration
# These values are loaded from environment variables or backend/.env
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:growing}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Backup Service Configuration
backup.webhook.url=${BACKUP_WEBHOOK_URL:http://localhost:5001}

# MCP Server (Spring AI 1.0 starter, SSE transport over WebMvc, mounted on 8082)
# Spring AI 1.0 only ships SSE transport (Streamable HTTP arrives in 1.1+).
# Client connects to GET /mcp/sse for the event stream, then POSTs JSON-RPC
# messages to the URL the server advertises in the SSE handshake (defaults
# to /mcp/message).
jwt.expiration=2592000000

spring.ai.mcp.server.name=growing
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.sse-endpoint=/mcp/sse
spring.ai.mcp.server.sse-message-endpoint=/mcp/message
