# Production Environment Configuration
# Usage: java -jar app.jar --spring.profiles.active=prod

# Application Name
spring.application.name=growing-app

# Server Port
server.port=8082

# Database Configuration
# These values are loaded from environment variables or backend/.env
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:growing}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
# Disable SQL logging in production for better performance and security
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Disable statistics in production
spring.jpa.properties.hibernate.generate_statistics=false

# Logging Configuration for Production
# Root level: INFO (only important messages)
logging.level.root=INFO

# Application-specific logging: INFO level
logging.level.com.growing.app=INFO

# Hibernate logging: only WARN and ERROR
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Spring Framework: only WARN and ERROR
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN

# Database Connection Pool: only WARN and ERROR
logging.level.com.zaxxer.hikari=WARN

# Log file configuration (optional - uncomment if you want file logging)
# logging.file.name=logs/growing-app.log
# logging.file.max-size=10MB
# logging.file.max-history=30
# logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
# logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# API Documentation - Disable in production for security
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3001
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Security: Expose only necessary information
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
