<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="#10b981"/>
  <!-- Upward trend line (career growth chart) -->
  <polyline
    points="4,26 10,20 16,22 22,13 28,7"
    stroke="white"
    stroke-width="2.5"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Arrow head -->
  <polyline
    points="23,6 28,7 27,12"
    stroke="white"
    stroke-width="2.5"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Data point dots -->
  <circle cx="10" cy="20" r="1.8" fill="white"/>
  <circle cx="16" cy="22" r="1.8" fill="white"/>
  <circle cx="22" cy="13" r="1.8" fill="white"/>
</svg>
