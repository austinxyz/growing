version: '3.8'

services:
  # Backend Spring Boot API
  backend:
    image: xuaustin/growing-backend:latest
    container_name: growing-backend
    restart: unless-stopped
    depends_on:
      - backup
    environment:
      # Database configuration
      DB_HOST: ${DB_HOST:-10.0.0.7}
      DB_PORT: ${DB_PORT:-37719}
      DB_NAME: ${DB_NAME:-growing}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # JWT Secret
      JWT_SECRET: /+Eyl6BRHw+WcxklOJYKe1mN0GVU1CAj745+E4Um1qY=
      # Spring Profile - Production mode (minimal logs, optimized performance)
      SPRING_PROFILES_ACTIVE: prod
      # Spring configuration
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      JAVA_OPTS: -Xms512m -Xmx1024m
      # Backup webhook URL - use service name in Docker network
      BACKUP_WEBHOOK_URL: http://backup:5000
    ports:
      - "8082:8082"
    networks:
      - growing-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/api/career-paths"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend Vue.js + Nginx
  frontend:
    image: xuaustin/growing-frontend:latest
    container_name: growing-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:80"
    networks:
      - growing-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Database Backup Service
  backup:
    image: xuaustin/growing-backup:latest
    container_name: growing-backup
    restart: unless-stopped
    environment:
      - DB_HOST=${DB_HOST:-10.0.0.7}
      - DB_PORT=${DB_PORT:-37719}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-growing}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_RETENTION_WEEKS=${BACKUP_RETENTION_WEEKS:-4}
      - BACKUP_RETENTION_MONTHS=${BACKUP_RETENTION_MONTHS:-12}
      - TZ=UTC
    volumes:
      - backup-data:/backups
    ports:
      - "5001:5000"
    networks:
      - growing-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  growing-network:
    driver: bridge

volumes:
  backup-data:
